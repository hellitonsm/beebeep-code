name: Build Windows (64-bit) + Installer

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
  workflow_call:

env:
  BEEBEEP_VERSION: "5.9.1"

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Qt with aqtinstall (no extra modules)
        shell: powershell
        run: |
          pip install aqtinstall
          Write-Host "Available arches for 5.15.2:"
          aqt list-qt windows desktop --arch 5.15.2
          Write-Host "Available modules for win64_msvc2019_64:"
          aqt list-qt windows desktop --modules 5.15.2 win64_msvc2019_64
          Write-Host "Installing Qt 5.15.2 base..."
          aqt install-qt --outputdir C:\Qt windows desktop 5.15.2 win64_msvc2019_64
          Add-Content $env:GITHUB_ENV "Qt5_Dir=C:\Qt\5.15.2\msvc2019_64"
          Add-Content $env:GITHUB_PATH "C:\Qt\5.15.2\msvc2019_64\bin"
          Add-Content $env:GITHUB_PATH "C:\Qt\Tools\mingw81_64\bin"

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build BeeBEEP
        shell: cmd
        run: |
          call qmake -o Makefile beebeep-desktop.pro CONFIG+=release
          nmake /f Makefile all

      - name: Deploy Qt DLLs with windeployqt
        shell: powershell
        run: |
          & "C:\Qt\5.15.2\msvc2019_64\bin\windeployqt.exe" --release test\beebeep.exe

      - name: Prepare installer staging
        shell: powershell
        run: |
          $releaseDir = "beebeep-$env:BEEBEEP_VERSION"
          New-Item -ItemType Directory -Path $releaseDir -Force
          Copy-Item "test\beebeep.exe" "$releaseDir\"
          if (Test-Path "test\*.dll") { Copy-Item "test\*.dll" "$releaseDir\" }
          Copy-Item "locale\*.qm" "$releaseDir\"
          Copy-Item "src\images\beebeep.png" "$releaseDir\"
          Copy-Item "misc\beep.wav" "$releaseDir\"
          Copy-Item "LICENSE.txt" "$releaseDir\"
          Copy-Item "CHANGELOG.txt" "$releaseDir\"
          Copy-Item "BEEBEEP-HELP.txt" "$releaseDir\"
          if (Test-Path "misc\beebeep_example.rc") { Copy-Item "misc\beebeep_example.rc" "$releaseDir\" }
          if (Test-Path "misc\beehosts_example.ini") { Copy-Item "misc\beehosts_example.ini" "$releaseDir\" }
          Get-ChildItem "$releaseDir"

      - name: Install Inno Setup
        shell: powershell
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $url = "https://jrsoftware.org/download.php/is.exe"
          $out = "$env:TEMP\innosetup.exe"
          Invoke-WebRequest -Uri $url -OutFile $out
          Start-Process $out -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART /DIR=C:\InnoSetup" -Wait
          Add-Content $env:GITHUB_PATH "C:\InnoSetup"

      - name: Build Inno Setup installer
        shell: cmd
        working-directory: scripts
        run: |
          iscc deploy_windows_package.iss

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: beebeep-windows-x64
          path: |
            scripts\*.exe
            test\beebeep.exe
