name: Build Windows (64-bit) + Installer

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  BEEBEEP_VERSION: "5.9.1"

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup MSYS2 + MinGW + Qt5
        uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-qt5
            mingw-w64-x86_64-qt5-multimedia
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            mingw-w64-x86_64-qt5-winextras

      - name: Build BeeBEEP
        shell: msys2 {0}
        run: |
          /mingw64/bin/qmake.exe -o Makefile beebeep-desktop.pro CONFIG+=release
          /mingw64/bin/mingw32-make.exe -j$(nproc) -f Makefile all

      - name: Deploy Qt DLLs with windeployqt
        shell: msys2 {0}
        run: |
          /mingw64/bin/windeployqt.exe --release test/beebeep.exe

      - name: Prepare installer staging
        shell: powershell
        run: |
          $releaseDir = "beebeep-$env:BEEBEEP_VERSION"
          New-Item -ItemType Directory -Path $releaseDir -Force
          Copy-Item "test\beebeep.exe" "$releaseDir\"
          Copy-Item "test\*.dll" "$releaseDir\"
          Copy-Item "locale\*.qm" "$releaseDir\"
          Copy-Item "src\images\beebeep.png" "$releaseDir\"
          Copy-Item "misc\beep.wav" "$releaseDir\"
          Copy-Item "LICENSE.txt" "$releaseDir\"
          Copy-Item "CHANGELOG.txt" "$releaseDir\"
          Copy-Item "BEEBEEP-HELP.txt" "$releaseDir\"
          if (Test-Path "misc\beebeep_example.rc") { Copy-Item "misc\beebeep_example.rc" "$releaseDir\" }
          if (Test-Path "misc\beehosts_example.ini") { Copy-Item "misc\beehosts_example.ini" "$releaseDir\" }
          Get-ChildItem "$releaseDir"

      - name: Install Inno Setup
        shell: powershell
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $url = "https://jrsoftware.org/download.php/is.exe"
          $out = "$env:TEMP\innosetup.exe"
          Invoke-WebRequest -Uri $url -OutFile $out
          Start-Process $out -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART /DIR=C:\InnoSetup" -Wait
          Add-Content $env:GITHUB_PATH "C:\InnoSetup"

      - name: Build Inno Setup installer
        shell: cmd
        working-directory: scripts
        run: |
          iscc deploy_windows_package.iss

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: beebeep-windows-x64
          path: |
            scripts\*.exe
            test\beebeep.exe
